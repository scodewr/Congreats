# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${CONGREATS_DB_USER:congreats}
quarkus.datasource.password=${CONGREATS_DB_PASSWORD:congreats}
quarkus.datasource.jdbc.url=${CONGREATS_DB_URL:jdbc:postgresql://localhost:5432/congreats}

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# HTTP
quarkus.http.port=${PORT:8080}
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.access-control-allow-credentials=true

# JWT
congreats.jwt.secret=${CONGREATS_JWT_SECRET:congreats-dev-secret-key-minimum-32-characters-required}
congreats.jwt.access-token-expiry-minutes=15
congreats.jwt.refresh-token-expiry-days=7
congreats.jwt.issuer=https://congreats.app

# Operation mode
congreats.mode=${CONGREATS_MODE:WORLD}

# File storage
congreats.storage.path=${CONGREATS_STORAGE_PATH:./uploads/photos}
congreats.storage.base-url=${CONGREATS_STORAGE_BASE_URL:http://localhost:8080/files}

# Test profile — uses Dev Services (auto PostgreSQL container)
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.flyway.migrate-at-start=true

# Jackson
quarkus.jackson.serialization-inclusion=non-null
quarkus.jackson.write-dates-as-timestamps=false

# Mailer (SMTP) — leave blank in dev to use mock mailer
quarkus.mailer.from=${CONGREATS_MAIL_FROM:noreply@congreats.app}
quarkus.mailer.host=${CONGREATS_SMTP_HOST:}
quarkus.mailer.port=${CONGREATS_SMTP_PORT:587}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${CONGREATS_SMTP_USER:}
quarkus.mailer.password=${CONGREATS_SMTP_PASSWORD:}
quarkus.mailer.mock=${CONGREATS_MAIL_MOCK:true}

# Twilio (SMS / WhatsApp) — leave blank to disable
congreats.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
congreats.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
congreats.twilio.sms-from=${TWILIO_SMS_FROM:}
congreats.twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:}

# App public URL (used in notification links)
congreats.app.url=${CONGREATS_APP_URL:http://localhost:5173}
